server {
    listen 80;
    server_name _;

    # Logs vão para stdout/stderr -> capturados pelo Docker (driver json-file
    # com rotação). Essencial para o container rodar com filesystem read-only.
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    client_max_body_size 2m;

    # Headers básicos de segurança.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Health do próprio Nginx (não toca na aplicação).
    location = /nginx-health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # Mídia servida diretamente pelo Nginx a partir do volume compartilhado.
    location /media/ {
        alias /usr/share/nginx/html/media/;
        try_files $uri =404;
        expires 1h;
        add_header Cache-Control "public" always;
    }

    # Tudo o mais (/, /health, /ready, /api/status, /static, ...) -> app:3000.
    location / {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
}
