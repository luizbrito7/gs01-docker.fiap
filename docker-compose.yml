# =============================================================================
# Lunar Mission Control - stack Docker produção-like (FIAP Global Solution)
#
# Princípios aplicados:
#   - Só o Nginx publica porta para o mundo; app/MySQL/Redis ficam internos.
#   - Imagens com versão fixa (sem :latest), app versionada em 1.0.0.
#   - Duas redes: frontend (nginx<->app) e backend interna (app<->mysql/redis).
#   - Volumes nomeados para mídia, dados do MySQL e dados do Redis.
#   - Healthchecks + depends_on com service_healthy para subida ordenada.
#   - Hardening: no-new-privileges, limites de CPU/memória, rotação de logs,
#     filesystem read-only no Nginx.
# =============================================================================

# Política de logs reutilizável (rotação para não encher o disco da EC2).
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ---------------------------------------------------------------------------
  # init-media: job de inicialização que semeia o volume de mídia (one-shot).
  # ---------------------------------------------------------------------------
  init-media:
    image: busybox:1.36.1
    container_name: lunar-init-media
    command: sh -c "mkdir -p /media && cp -r /seed-media/. /media/ && chmod -R 755 /media && ls -lah /media"
    volumes:
      - lunar_media_data:/media
      - ./media:/seed-media:ro
    networks:
      - backend
    restart: "no"
    security_opt:
      - no-new-privileges:true
    mem_limit: 64m
    cpus: 0.25
    logging: *default-logging
    labels:
      project: "lunar-mission-control"
      owner: "rm564630"
      service: "init-media"

  # ---------------------------------------------------------------------------
  # mysql: banco da telemetria. Sem porta pública, apenas rede backend interna.
  # ---------------------------------------------------------------------------
  mysql:
    image: mysql:8.4
    container_name: lunar-mysql
    # Tuning enxuto: cabe com folga no mem_limit de 512m (ideal p/ EC2 pequena).
    command:
      - "--innodb-buffer-pool-size=128M"
      - "--performance-schema=OFF"
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    expose:
      - "3306"
    volumes:
      - lunar_mysql_data:/var/lib/mysql
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p\"$$MYSQL_ROOT_PASSWORD\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    cpus: 0.75
    logging: *default-logging
    labels:
      project: "lunar-mission-control"
      owner: "rm564630"
      service: "mysql"

  # ---------------------------------------------------------------------------
  # redis: cache da API. Persistência habilitada no volume de dados.
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7.4-alpine
    container_name: lunar-redis
    command: ["redis-server", "--appendonly", "yes"]
    expose:
      - "6379"
    volumes:
      - lunar_redis_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    mem_limit: 128m
    cpus: 0.25
    logging: *default-logging
    labels:
      project: "lunar-mission-control"
      owner: "rm564630"
      service: "redis"

  # ---------------------------------------------------------------------------
  # app: aplicação Node.js. Imagem versionada, não-root, sem porta pública.
  # Fica em frontend (para o Nginx alcançar) e backend (para MySQL/Redis).
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: lunar-mission-control-app:1.0.0
    container_name: lunar-app
    environment:
      APP_PORT: ${APP_PORT:-3000}
      APP_ENV: ${APP_ENV:-production}
      NODE_ENV: ${NODE_ENV:-production}
      MISSION_NAME: ${MISSION_NAME:-Artemis FIAP Lunar Base}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_NAME: ${MYSQL_DATABASE}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
    expose:
      - "3000"
    volumes:
      - lunar_media_data:/app/public/media
    networks:
      - frontend
      - backend
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      init-media:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    cpus: 0.5
    logging: *default-logging
    labels:
      project: "lunar-mission-control"
      owner: "rm564630"
      service: "app"

  # ---------------------------------------------------------------------------
  # nginx: reverse proxy / webserver. ÚNICO serviço com porta pública.
  # Filesystem read-only + tmpfs nos diretórios graváveis.
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: lunar-nginx
    ports:
      - "${PUBLIC_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - lunar_media_data:/usr/share/nginx/html/media:ro
    networks:
      - frontend
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/nginx-health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    security_opt:
      - no-new-privileges:true
    mem_limit: 64m
    cpus: 0.25
    logging: *default-logging
    labels:
      project: "lunar-mission-control"
      owner: "rm564630"
      service: "nginx"

# =============================================================================
# Redes
#   frontend -> exposta (nginx <-> app)
#   backend  -> internal: true (sem acesso à internet): app/mysql/redis/init
# =============================================================================
networks:
  frontend:
    name: lunar_frontend
    driver: bridge
  backend:
    name: lunar_backend
    driver: bridge
    internal: true

# =============================================================================
# Volumes nomeados (persistência)
# =============================================================================
volumes:
  lunar_media_data:
    name: lunar_media_data
  lunar_mysql_data:
    name: lunar_mysql_data
  lunar_redis_data:
    name: lunar_redis_data
